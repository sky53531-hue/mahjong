<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻將賽事統計系統</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e4e2dc;
    --border2: #ccc9c0;
    --text: #1a1a18;
    --text2: #6b6960;
    --text3: #9b9890;
    --green: #2d6a2d;
    --green-bg: #eaf3de;
    --red: #a32d2d;
    --red-bg: #fcebeb;
    --amber: #7a4f0a;
    --amber-bg: #faeeda;
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* Header */
  .app-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .app-title { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
  .app-title span { font-size: 20px; }
  .sync-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .sync-dot.err { background: var(--red); }
  .sync-dot.spin { background: var(--amber); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

  /* Nav */
  .nav { display: flex; gap: 4px; padding: 16px 24px 0; border-bottom: 1px solid var(--border); background: var(--surface); }
  .nav-btn { padding: 8px 18px; border-radius: var(--radius) var(--radius) 0 0; border: 1px solid transparent; background: transparent; cursor: pointer; font-size: 13px; color: var(--text2); font-weight: 500; border-bottom: none; transition: all .15s; }
  .nav-btn:hover { background: var(--bg); color: var(--text); }
  .nav-btn.on { background: var(--bg); color: var(--text); border-color: var(--border); border-bottom-color: var(--bg); position: relative; top: 1px; }

  /* Main */
  .main { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
  .pg { display: none; }
  .pg.on { display: block; }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--text); }

  /* Form */
  .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; margin-bottom: 14px; }
  .fg label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: .4px; }
  .fg input, .fg select, input[type=text], input[type=date], input[type=number], select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; color: var(--text); background: var(--surface); outline: none; transition: border-color .15s; }
  input:focus, select:focus { border-color: var(--border2); }

  /* Player grid */
  .pgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 10px; margin: 12px 0; }
  .pbox { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .pbox .pn { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
  .irow { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .irow .lbl { font-size: 11px; color: var(--text2); width: 38px; flex-shrink: 0; }
  .irow input { flex: 1; min-width: 0; text-align: right; font-size: 14px; font-weight: 500; padding: 5px 8px; }
  .netl { font-size: 11px; color: var(--text2); text-align: right; padding-top: 6px; border-top: 1px solid var(--border); margin-top: 4px; }
  .netl b { font-weight: 600; }

  /* Sum bar */
  .sum-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); margin-top: 12px; }
  .sum-label { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
  .sum-val { font-size: 20px; font-weight: 700; }

  /* Buttons */
  .btn { padding: 8px 18px; border-radius: var(--radius); border: 1px solid var(--border2); cursor: pointer; font-size: 13px; font-weight: 500; background: var(--surface); color: var(--text); transition: all .15s; }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--text); color: var(--surface); border-color: var(--text); }
  .btn-primary:hover { opacity: .85; background: var(--text); }
  .btn-danger { color: var(--red); border-color: #f0c0c0; }
  .btn-danger:hover { background: var(--red-bg); }
  .btn-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

  /* Metrics */
  .mgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 10px; margin-bottom: 16px; }
  .mc { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .mc .ml { font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
  .mc .mv { font-size: 20px; font-weight: 700; color: var(--text); }

  /* Filter row */
  .frow { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .frow label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .frow input[type=date], .frow select { width: auto; font-size: 12px; padding: 6px 10px; }

  /* View toggle */
  .vtog { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; width: fit-content; margin-bottom: 14px; }
  .vb { padding: 7px 18px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text2); transition: all .15s; }
  .vb.on { background: var(--text); color: var(--surface); }

  /* Rank table */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 9px 10px; border-bottom: 1px solid var(--border); color: var(--text2); font-weight: 600; text-align: left; white-space: nowrap; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; }
  td { padding: 10px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  /* Badges */
  .bw { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; background: var(--green-bg); color: var(--green); }
  .bl { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; background: var(--red-bg); color: var(--red); }
  .bn { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; background: var(--bg); color: var(--text2); }
  .pos { display: inline-flex; width: 22px; height: 22px; align-items: center; justify-content: center; border-radius: 50%; font-size: 11px; font-weight: 700; }
  .p1 { background: var(--amber-bg); color: var(--amber); }
  .p2 { background: #f1efe8; color: #555; }
  .p3 { background: var(--red-bg); color: var(--red); }
  .plus { color: var(--green); font-weight: 600; }
  .minus { color: var(--red); font-weight: 600; }

  /* Summary cards */
  .scard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 10px; }
  .sh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .sg { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .si .sl { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
  .si .sv2 { font-size: 13px; font-weight: 600; }

  /* Det cards */
  .det-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
  .det-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .det-date { font-size: 13px; font-weight: 600; }
  .det-ses { font-size: 12px; color: var(--text2); margin-left: 6px; }
  .det-players { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 8px; }
  .det-p { background: var(--bg); border-radius: 8px; padding: 9px 11px; }
  .det-pname { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .3px; }
  .det-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
  .det-row span:first-child { color: var(--text2); }
  .det-net { display: flex; justify-content: space-between; font-size: 12px; padding-top: 5px; border-top: 1px solid var(--border); margin-top: 3px; }
  .det-net span:first-child { color: var(--text2); }

  /* Player list */
  .plist { display: grid; gap: 8px; }
  .pitem { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); }
  .pnum { width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); border-radius: 50%; font-size: 11px; color: var(--text2); flex-shrink: 0; }

  /* Toast */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--surface); padding: 9px 20px; border-radius: var(--radius); font-size: 13px; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 999; white-space: nowrap; font-weight: 500; }
  .toast.show { opacity: 1; }
  .empty { text-align: center; padding: 2.5rem; color: var(--text2); font-size: 13px; }

  /* Loading */
  .loading { display: flex; align-items: center; gap: 8px; padding: 20px; color: var(--text2); font-size: 13px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sep { font-size: 11px; color: var(--text3); }
  .section-hdr { display: flex; align-items: center; justify-content: space-between; margin: 8px 0 4px; }
  .section-title { font-size: 13px; font-weight: 600; }
  .hint-text { font-size: 11px; color: var(--text2); margin-bottom: 10px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title"><span>🀄</span> 麻將賽事統計系統</div>
  <div style="display:flex;align-items:center;gap:12px">
    <button onclick="exportBackup()" style="padding:5px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:5px">
      ⬇ 匯出備份
    </button>
    <div class="sync-badge">
      <div class="sync-dot spin" id="sync-dot"></div>
      <span id="sync-label">連線中...</span>
    </div>
  </div>
</header>

<nav class="nav">
  <button class="nav-btn on" onclick="goTab('entry',this)">＋ 新增紀錄</button>
  <button class="nav-btn" onclick="goTab('rank',this)">🏆 排行榜</button>
  <button class="nav-btn" onclick="goTab('rec',this)">☰ 所有紀錄</button>
  <button class="nav-btn" onclick="goTab('mgr',this)">⚙ 參賽者管理</button>
</nav>

<div class="main">

  <!-- 新增紀錄 -->
  <div id="pg-entry" class="pg on">
    <div class="card">
      <div class="card-title">比賽資訊</div>
      <div class="form-row">
        <div class="fg"><label>日期</label><input type="date" id="e-date"></div>
        <div class="fg"><label>場次</label><input type="text" id="e-session" placeholder="例：第1場"></div>
        <div class="fg"><label>備註（選填）</label><input type="text" id="e-note"></div>
      </div>
      <div class="section-hdr">
        <div class="section-title">輸贏與參賽費</div>
        <button class="btn btn-danger" style="font-size:11px;padding:5px 12px" onclick="clearInputs()">✕ 清除所有輸入值</button>
      </div>
      <div class="hint-text">輸贏：正數=贏，負數=輸 ｜ 參賽費：本場繳交金額（空白=0）</div>
      <div class="pgrid" id="e-grid"><div class="loading"><div class="spinner"></div>載入中...</div></div>
      <div class="sum-bar">
        <div>
          <div class="sum-label">輸贏合計（僅統計已填寫欄位）</div>
          <div class="sum-val" id="sum-val" style="color:var(--text2)">0</div>
        </div>
        <div id="sum-status"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="doSave()">💾 儲存紀錄</button>
        <button class="btn" onclick="clearInputs()">↺ 重新輸入</button>
      </div>
    </div>
  </div>

  <!-- 排行榜 -->
  <div id="pg-rank" class="pg">
    <div class="frow">
      <label>日期範圍：</label>
      <input type="date" id="r-from" onchange="renderRank()">
      <span class="sep">至</span>
      <input type="date" id="r-to" onchange="renderRank()">
      <button class="btn" style="font-size:12px;padding:5px 12px" onclick="document.getElementById('r-from').value='';document.getElementById('r-to').value='';renderRank()">清除</button>
    </div>
    <div class="mgrid" id="r-meta"></div>
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>名次</th><th>姓名</th><th>場次</th>
            <th>輸贏合計</th><th>總參賽費</th><th>實際淨值</th>
            <th>最佳單場</th><th>最差單場</th><th>勝場率</th>
          </tr></thead>
          <tbody id="r-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 所有紀錄 -->
  <div id="pg-rec" class="pg">
    <div class="frow">
      <label>日期：</label>
      <input type="date" id="f-from" onchange="renderRec()">
      <span class="sep">至</span>
      <input type="date" id="f-to" onchange="renderRec()">
      <label>參賽者：</label>
      <select id="f-p" onchange="renderRec()"><option value="">全部</option></select>
      <button class="btn" style="font-size:12px;padding:5px 12px" onclick="clearRecF()">清除</button>
    </div>
    <div class="vtog">
      <button class="vb on" onclick="switchView('sum',this)">區間總統計</button>
      <button class="vb" onclick="switchView('det',this)">逐場明細</button>
    </div>
    <div id="v-sum"></div>
    <div id="v-det" style="display:none"></div>
  </div>

  <!-- 參賽者管理 -->
  <div id="pg-mgr" class="pg">
    <div class="card">
      <div class="card-title">參賽者名單（最多8位）</div>
      <div class="plist" id="p-list"></div>
      <div style="display:flex;gap:10px;margin-top:16px;align-items:center;flex-wrap:wrap">
        <input type="text" id="p-new" placeholder="新增參賽者姓名" style="max-width:200px">
        <button class="btn btn-primary" onclick="addP()">新增</button>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
var BIN_ID = '69fef118250b1311c3258d94';
var API_KEY = '$2a$10$vXNSb0IG/J6l2iaqedRwEO/.LRfZZ2p/OFLPE7Zveg2BI7v7LFl3K';
var BASE = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
var P = [], R = [], curView = 'sum';

function tip(m) {
  var t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}
function f2(v) { return Math.round(v * 100) / 100; }
function fs(v) { var r = f2(v); return (r > 0 ? '+' : '') + r; }
function eid(s) { var i = P.indexOf(s); return 'p_' + (i >= 0 ? i : s.replace(/[^a-zA-Z0-9]/g, '_')); }
function readNum(el) {
  if (!el) return null;
  var v = el.value.trim();
  if (v === '') return null;
  var n = parseFloat(v);
  return isNaN(n) ? null : n;
}

function setSyncStatus(state, msg) {
  var dot = document.getElementById('sync-dot');
  var lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot' + (state === 'ok' ? '' : state === 'err' ? ' err' : ' spin');
  lbl.textContent = msg;
}

async function apiGet() {
  var res = await fetch(BASE + '/latest', { headers: { 'X-Master-Key': API_KEY } });
  if (!res.ok) throw new Error('讀取失敗');
  var json = await res.json();
  return json.record;
}

async function apiPut(data) {
  var res = await fetch(BASE, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error('寫入失敗');
}

async function load() {
  setSyncStatus('loading', '連線中...');
  try {
    var data = await apiGet();
    P = data.players || ['玩家A','玩家B','玩家C','玩家D','玩家E','玩家F','玩家G','玩家H'];
    R = data.records || [];
    setSyncStatus('ok', '已同步 · ' + new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('err', '連線失敗');
    P = ['玩家A','玩家B','玩家C','玩家D','玩家E','玩家F','玩家G','玩家H'];
    R = [];
    tip('⚠ 無法連線至資料庫');
  }
  buildEntry();
}

async function saveAll() {
  setSyncStatus('loading', '儲存中...');
  try {
    await apiPut({ players: P, records: R });
    setSyncStatus('ok', '已同步 · ' + new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('err', '儲存失敗');
    tip('⚠ 儲存失敗，請檢查網路');
  }
}

function goTab(id, el) {
  document.querySelectorAll('.pg').forEach(function(x) { x.classList.remove('on'); });
  document.querySelectorAll('.nav-btn').forEach(function(x) { x.classList.remove('on'); });
  document.getElementById('pg-' + id).classList.add('on');
  el.classList.add('on');
  if (id === 'rank') renderRank();
  if (id === 'rec') { buildRecFilter(); renderRec(); }
  if (id === 'mgr') renderMgr();
}

function switchView(v, el) {
  curView = v;
  document.querySelectorAll('.vb').forEach(function(x) { x.classList.remove('on'); });
  el.classList.add('on');
  document.getElementById('v-sum').style.display = v === 'sum' ? 'block' : 'none';
  document.getElementById('v-det').style.display = v === 'det' ? 'block' : 'none';
  renderRec();
}

function buildEntry() {
  var g = document.getElementById('e-grid');
  g.innerHTML = P.map(function(p) {
    var id = eid(p);
    return '<div class="pbox">' +
      '<div class="pn">' + p + '</div>' +
      '<div class="irow"><span class="lbl">輸贏</span><input type="number" step="any" id="sc-' + id + '" oninput="updateAll()"></div>' +
      '<div class="irow"><span class="lbl">參賽費</span><input type="number" step="any" min="0" id="fe-' + id + '" oninput="updateAll()"></div>' +
      '<div class="netl">淨值：<b id="nt-' + id + '" style="color:var(--text2)">-</b></div></div>';
  }).join('');
  updateAll();
}

function updateAll() {
  var sum = 0, hasAny = false;
  P.forEach(function(p) {
    var id = eid(p);
    var sc = readNum(document.getElementById('sc-' + id));
    var fe = readNum(document.getElementById('fe-' + id));
    var ntEl = document.getElementById('nt-' + id);
    if (!ntEl) return;
    if (sc !== null) {
      sum += sc; hasAny = true;
      var nt = f2(sc - (fe !== null ? fe : 0));
      ntEl.textContent = (nt > 0 ? '+' : '') + nt;
      ntEl.style.color = nt > 0 ? 'var(--green)' : nt < 0 ? 'var(--red)' : 'var(--text2)';
    } else {
      ntEl.textContent = '-'; ntEl.style.color = 'var(--text2)';
    }
  });
  var r = f2(sum);
  var valEl = document.getElementById('sum-val');
  var stEl = document.getElementById('sum-status');
  if (!hasAny) {
    valEl.textContent = '0'; valEl.style.color = 'var(--text2)'; stEl.innerHTML = ''; return;
  }
  valEl.textContent = (r > 0 ? '+' : '') + r;
  if (r === 0) {
    valEl.style.color = 'var(--green)';
    stEl.innerHTML = '<span style="color:var(--green);font-size:13px;font-weight:600">✓ 合計正確</span>';
  } else {
    valEl.style.color = 'var(--red)';
    stEl.innerHTML = '<span style="color:var(--red);font-size:13px;font-weight:600">⚠ 合計應為 0</span>';
  }
}

function clearInputs() {
  P.forEach(function(p) {
    var id = eid(p);
    var sc = document.getElementById('sc-' + id);
    var fe = document.getElementById('fe-' + id);
    var nt = document.getElementById('nt-' + id);
    if (sc) sc.value = ''; if (fe) fe.value = '';
    if (nt) { nt.textContent = '-'; nt.style.color = 'var(--text2)'; }
  });
  document.getElementById('sum-val').textContent = '0';
  document.getElementById('sum-val').style.color = 'var(--text2)';
  document.getElementById('sum-status').innerHTML = '';
  tip('已清除所有輸入值');
}

async function doSave() {
  var date = document.getElementById('e-date').value;
  var ses = document.getElementById('e-session').value.trim();
  var note = document.getElementById('e-note').value.trim();
  if (!date) { alert('請選擇日期'); return; }
  if (!ses) { alert('請填寫場次'); return; }
  var sc = {}, fe = {}, cnt = 0, sum = 0;
  P.forEach(function(p) {
    var id = eid(p);
    var sv = readNum(document.getElementById('sc-' + id));
    var fv = readNum(document.getElementById('fe-' + id));
    if (sv !== null) { sc[p] = sv; fe[p] = fv !== null ? fv : 0; cnt++; sum += sv; }
  });
  if (cnt < 2) { alert('請至少輸入2位參賽者的輸贏值'); return; }
  var r = f2(sum);
  if (r !== 0 && !confirm('輸贏合計為 ' + r + '，不等於 0，確定仍要儲存？')) return;
  R.push({ id: Date.now(), date: date, ses: ses, note: note, sc: sc, fe: fe });
  await saveAll();
  tip('✓ 紀錄已儲存');
  document.getElementById('e-session').value = '';
  document.getElementById('e-note').value = '';
  clearInputs();
}

function getStats(list) {
  var st = {};
  P.forEach(function(p) { st[p] = { sc: 0, fe: 0, g: 0, w: 0, best: null, worst: null }; });
  list.forEach(function(r) {
    Object.keys(r.sc).forEach(function(p) {
      if (!st[p]) st[p] = { sc: 0, fe: 0, g: 0, w: 0, best: null, worst: null };
      var v = r.sc[p], fv = (r.fe && r.fe[p]) || 0;
      st[p].sc += v; st[p].fe += fv; st[p].g++;
      if (v > 0) st[p].w++;
      if (st[p].best === null || v > st[p].best) st[p].best = v;
      if (st[p].worst === null || v < st[p].worst) st[p].worst = v;
    });
  });
  return st;
}

function renderRank() {
  var from = document.getElementById('r-from').value;
  var to = document.getElementById('r-to').value;
  var list = R.filter(function(r) { return (!from || r.date >= from) && (!to || r.date <= to); });
  var st = getStats(list);
  var sorted = Object.entries(st).filter(function(e) { return e[1].g > 0; })
    .sort(function(a, b) { return f2(b[1].sc - b[1].fe) - f2(a[1].sc - a[1].fe); });
  var fees = list.reduce(function(a, r) { return a + Object.values(r.fe || {}).reduce(function(x, y) { return x + y; }, 0); }, 0);
  var top = sorted[0]; var topNet = top ? f2(top[1].sc - top[1].fe) : 0;
  document.getElementById('r-meta').innerHTML =
    '<div class="mc"><div class="ml">比賽場次</div><div class="mv">' + list.length + '</div></div>' +
    '<div class="mc"><div class="ml">總參賽費</div><div class="mv">' + f2(fees) + '</div></div>' +
    '<div class="mc"><div class="ml">目前龍頭</div><div class="mv" style="font-size:15px">' + (top ? top[0] : '-') + '</div></div>' +
    '<div class="mc"><div class="ml">龍頭淨值</div><div class="mv" style="font-size:16px;color:' + (topNet >= 0 ? 'var(--green)' : 'var(--red)') + '">' + (top ? fs(topNet) : '-') + '</div></div>';
  var tb = document.getElementById('r-body');
  if (!sorted.length) { tb.innerHTML = '<tr><td colspan="9" class="empty">尚無紀錄</td></tr>'; return; }
  tb.innerHTML = sorted.map(function(e, i) {
    var p = e[0], s = e[1]; var net = f2(s.sc - s.fe); var wr = Math.round(s.w / s.g * 100);
    var pos = i < 3 ? '<span class="pos p' + (i + 1) + '">' + (i + 1) + '</span>' : '<span style="font-size:12px;color:var(--text2)">' + (i + 1) + '</span>';
    return '<tr>' +
      '<td>' + pos + '</td>' +
      '<td style="font-weight:600">' + p + '</td>' +
      '<td>' + s.g + '</td>' +
      '<td><span class="' + (s.sc > 0 ? 'plus' : s.sc < 0 ? 'minus' : '') + '">' + fs(s.sc) + '</span></td>' +
      '<td style="color:var(--red)">－' + f2(s.fe) + '</td>' +
      '<td><span class="' + (net > 0 ? 'plus' : net < 0 ? 'minus' : '') + '" style="font-size:14px">' + fs(net) + '</span></td>' +
      '<td><span class="bw">' + (s.best >= 0 ? '+' : '') + s.best + '</span></td>' +
      '<td><span class="bl">' + s.worst + '</span></td>' +
      '<td><span class="' + (wr >= 50 ? 'bw' : 'bn') + '">' + s.w + '勝(' + wr + '%)</span></td></tr>';
  }).join('');
}

function buildRecFilter() {
  var sel = document.getElementById('f-p');
  sel.innerHTML = '<option value="">全部</option>' + P.map(function(p) { return '<option value="' + p + '">' + p + '</option>'; }).join('');
}

function getFiltered() {
  var from = document.getElementById('f-from').value;
  var to = document.getElementById('f-to').value;
  var pl = document.getElementById('f-p').value;
  return R.filter(function(r) { return (!from || r.date >= from) && (!to || r.date <= to) && (!pl || pl in r.sc); })
    .sort(function(a, b) { return b.date.localeCompare(a.date) || b.id - a.id; });
}

function clearRecF() {
  document.getElementById('f-from').value = '';
  document.getElementById('f-to').value = '';
  document.getElementById('f-p').value = '';
  renderRec();
}

function renderRec() {
  var list = getFiltered();
  if (curView === 'sum') renderSum(list); else renderDet(list);
}

function renderSum(list) {
  var from = document.getElementById('f-from').value; var to = document.getElementById('f-to').value;
  var lbl = from && to ? from + ' ～ ' + to : from ? from + ' 之後' : to ? to + ' 之前' : '全部區間';
  var fees = list.reduce(function(a, r) { return a + Object.values(r.fe || {}).reduce(function(x, y) { return x + y; }, 0); }, 0);
  var st = getStats(list);
  var sorted = Object.entries(st).filter(function(e) { return e[1].g > 0; })
    .sort(function(a, b) { return f2(b[1].sc - b[1].fe) - f2(a[1].sc - a[1].fe); });
  var html = '<div class="card" style="margin-bottom:14px">' +
    '<div style="font-size:12px;color:var(--text2);margin-bottom:12px">' + lbl + '　共 <b>' + list.length + '</b> 場　總參賽費：<b>' + f2(fees) + '</b></div>' +
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px">' +
    sorted.slice(0, 4).map(function(e, i) {
      var net = f2(e[1].sc - e[1].fe); var m = ['🥇','🥈','🥉',''][i];
      return '<div style="text-align:center"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">' + m + ' ' + e[0] + '</div>' +
        '<div style="font-size:16px;font-weight:700" class="' + (net > 0 ? 'plus' : net < 0 ? 'minus' : '') + '">' + fs(net) + '</div></div>';
    }).join('') + '</div></div>';
  if (!sorted.length) { html += '<div class="empty">尚無符合的紀錄</div>'; }
  else {
    html += sorted.map(function(e, i) {
      var p = e[0], s = e[1]; var net = f2(s.sc - s.fe); var wr = s.g ? Math.round(s.w / s.g * 100) : 0;
      var pos = i < 3 ? '<span class="pos p' + (i + 1) + '">' + (i + 1) + '</span>' : '<span style="font-size:11px;color:var(--text2);font-weight:600">' + (i + 1) + '</span>';
      return '<div class="scard"><div class="sh"><div style="display:flex;align-items:center;gap:8px">' + pos +
        '<span style="font-size:14px;font-weight:600">' + p + '</span></div>' +
        '<span style="font-size:20px;font-weight:700" class="' + (net > 0 ? 'plus' : net < 0 ? 'minus' : '') + '">' + fs(net) + '</span></div>' +
        '<div class="sg">' +
        '<div class="si"><div class="sl">輸贏合計</div><div class="sv2 ' + (s.sc > 0 ? 'plus' : s.sc < 0 ? 'minus' : '') + '">' + fs(s.sc) + '</div></div>' +
        '<div class="si"><div class="sl">總參賽費</div><div class="sv2" style="color:var(--red)">－' + f2(s.fe) + '</div></div>' +
        '<div class="si"><div class="sl">出賽場次</div><div class="sv2">' + s.g + ' 場</div></div>' +
        '<div class="si"><div class="sl">勝場率</div><div class="sv2">' + s.w + '勝(' + wr + '%)</div></div>' +
        '<div class="si"><div class="sl">最佳單場</div><div class="sv2 plus">' + (s.best >= 0 ? '+' : '') + s.best + '</div></div>' +
        '<div class="si"><div class="sl">最差單場</div><div class="sv2 minus">' + s.worst + '</div></div>' +
        '</div></div>';
    }).join('');
  }
  document.getElementById('v-sum').innerHTML = html;
}

function renderDet(list) {
  var el = document.getElementById('v-det');
  if (!list.length) { el.innerHTML = '<div class="empty">尚無符合的紀錄</div>'; return; }
  el.innerHTML = list.map(function(r) {
    var fe = r.fe || {};
    var pcards = Object.keys(r.sc).map(function(p) {
      var v = r.sc[p], fv = fe[p] || 0, nt = f2(v - fv);
      return '<div class="det-p"><div class="det-pname">' + p + '</div>' +
        '<div class="det-row"><span>輸贏</span><span class="' + (v > 0 ? 'plus' : v < 0 ? 'minus' : '') + '">' + fs(v) + '</span></div>' +
        '<div class="det-row"><span>參賽費</span><span style="color:var(--red)">－' + fv + '</span></div>' +
        '<div class="det-net"><span>淨值</span><b class="' + (nt > 0 ? 'plus' : nt < 0 ? 'minus' : '') + '">' + fs(nt) + '</b></div></div>';
    }).join('');
    return '<div class="det-card"><div class="det-top">' +
      '<div><span class="det-date">' + r.date + '</span><span class="det-ses">' + r.ses + '</span>' +
      (r.note ? '<span style="font-size:11px;color:var(--text2);margin-left:6px">' + r.note + '</span>' : '') + '</div>' +
      '<button onclick="delR(' + r.id + ')" style="border:none;background:none;cursor:pointer;color:var(--red);font-size:16px;padding:2px 4px" title="刪除">🗑</button>' +
      '</div><div class="det-players">' + pcards + '</div></div>';
  }).join('');
}

async function delR(id) {
  if (!confirm('確定刪除這筆紀錄？')) return;
  R = R.filter(function(r) { return r.id !== id; });
  await saveAll(); tip('已刪除'); renderRec();
}

function renderMgr() {
  document.getElementById('p-list').innerHTML = P.map(function(p, i) {
    return '<div class="pitem"><span class="pnum">' + (i + 1) + '</span>' +
      '<input type="text" value="' + p + '" style="flex:1;max-width:180px" onchange="updP(' + i + ',this.value)">' +
      '<button class="btn btn-danger" onclick="rmP(' + i + ')" style="padding:4px 12px;font-size:12px">移除</button></div>';
  }).join('');
}

async function updP(i, v) { P[i] = v; await saveAll(); buildEntry(); }
async function addP() {
  var v = document.getElementById('p-new').value.trim();
  if (!v) return; if (P.length >= 8) { alert('最多8位'); return; }
  P.push(v); document.getElementById('p-new').value = '';
  await saveAll(); renderMgr(); buildEntry();
}
async function rmP(i) {
  if (!confirm('確定移除「' + P[i] + '」？')) return;
  P.splice(i, 1); await saveAll(); renderMgr(); buildEntry();
}

function exportBackup() {
  var now = new Date();
  var dateStr = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0');
  var data = { players: P, records: R, exportedAt: now.toLocaleString('zh-TW') };
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '麻將賽事備份_' + dateStr + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  tip('✓ 備份已下載：麻將賽事備份_' + dateStr + '.json');
}

document.getElementById('e-date').value = new Date().toISOString().split('T')[0];
load();
</script>
